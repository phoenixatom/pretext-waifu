<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretext Waifu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <div id="controls">
      <label>Size <input type="range" id="fontSize" min="6" max="28" value="10" step="1"></label>
      <label>Contrast <input type="range" id="contrast" min="0.5" max="3" value="1.5" step="0.1"></label>
      <select id="theme">
        <option value="original">Original</option>
        <option value="sakura">Sakura</option>
        <option value="ocean">Ocean</option>
        <option value="ember">Ember</option>
        <option value="mono">Mono</option>
      </select>
      <select id="mode">
        <option value="contour">Contour</option>
        <option value="fill">Fill</option>
      </select>
      <select id="textPreset">
        <option value="jp">Japanese</option>
        <option value="en">English</option>
        <option value="custom">Custom</option>
      </select>
      <button id="changeImage" title="Load a different image">Image</button>
      <button id="save" title="Save as PNG">Save</button>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>
    <div id="customTextWrap" class="hidden">
      <textarea id="customText" placeholder="Type or paste your own text here..." rows="3"></textarea>
    </div>
    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div id="dropzone">
        <div class="drop-content">
          <span class="drop-icon">花</span>
          <p>Drop waifu image here</p>
          <span class="drop-hint">click, paste, or drag &middot; transparent PNGs work best for Contour mode</span>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
